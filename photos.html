<!DOCTYPE html>
<html lang="en">

<head>
  <title>Brian's Photos</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A collection of photos from places I've been." />

  <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  <link rel="stylesheet" type="text/css" href="css/core-styles.css" />
  <link rel="stylesheet" type="text/css" href="css/nav.css" />
  <link rel="stylesheet" type="text/css" href="css/tooltip.css" />
  <link rel="stylesheet" type="text/css" href="css/underline.css" />
  <link rel="stylesheet" type="text/css" href="css/notepad.css" />
  <link rel="stylesheet" type="text/css" href="css/photos.css" />
</head>

<body class="photos-page">
  <div class="site-wrapper">
    <nav class="row">
      <div class="pill-nav">
        <a class="pill-tab" href="/">Home</a>
        <a class="pill-tab active" href="/photos">Photos</a>
        <a class="pill-tab" href="/notepad">Notepad</a>
      </div>
    </nav>

    <div class="scroll-fade"></div>

    <main class="photos-content">
      <div id="photos-grid" class="photos-grid"></div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    const PHOTOS = [
      { src: "assets/photos/jerseys.jpeg", caption: "Custom Made Jerseys", location: "Seattle", date: "Feb 26, 2026" },
      { src: "assets/photos/seahawks.jpeg", caption: "Seahawks Super Bowl Run", location: "Seattle", date: "Jan 17, 2026" },
      { src: "assets/photos/dr.jpeg", caption: "Matt & Claudia's Wedding", location: "Dominican Republic", date: "Dec 11, 2025" },
      { src: "assets/photos/jays.jpeg", caption: "Jays Win the AL East", location: "Toronto", date: "Sep 26, 2025" },
      { src: "assets/photos/weeknd.jpeg", caption: "Weeknd @ Seattle", location: "Seattle", date: "Jul 12, 2025" },
      { src: "assets/photos/sauga.jpeg", caption: "Alderwood Trail", location: "Home", date: "May 25, 2025" },
      { src: "assets/photos/seattle.jpeg", caption: "Space Needle", location: "Seattle", date: "Jul 14, 2024" },
      { src: "assets/photos/mariners.jpeg", caption: "Jays World Series Run", location: "Seattle", date: "Oct 15, 2025" },
      { src: "assets/photos/flighty.png", caption: "70 Flights & Counting", location: "Everywhere", date: "Jan 1 2026" },
      { src: "assets/photos/xbox.png", caption: "Xbox Forever", location: "Mississauga", date: "Dec 15 2004" },
      { src: "assets/photos/killy.jpeg", caption: "Killy", location: "Toronto", date: "Mar 8 2018" },
      { src: "assets/photos/nav.jpeg", caption: "Price On My Head", location: "Toronto", date: "Feb 26 2019" },
      { src: "assets/photos/ryan.jpeg", caption: "Ryan UO", location: "New York", date: "Jul 2 2019" },
      { src: "assets/portrait.jpg", caption: "Me", location: "Toronto", date: "Oct 16 2017" },
    ];

    const grid = document.getElementById("photos-grid");
    PHOTOS.forEach((p) => {
      const fig = document.createElement("figure");
      fig.className = "photo-item";

      const img = document.createElement("img");
      img.src = p.src;
      img.alt = p.caption;
      img.loading = "lazy";
      fig.appendChild(img);

      const info = document.createElement("div");
      info.className = "photo-info";

      const caption = document.createElement("p");
      caption.className = "photo-caption";
      caption.textContent = p.caption;
      info.appendChild(caption);

      const meta = document.createElement("p");
      meta.className = "photo-meta";
      meta.textContent = `${p.location} · ${p.date}`;
      info.appendChild(meta);

      fig.appendChild(info);
      grid.appendChild(fig);
    });
  </script>
</body>

</html>
