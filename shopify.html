    async function deriveKey(password, salt) {
      const encoder = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey(
        "raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function decrypt(password) {
      const payload = Uint8Array.from(atob(ENCRYPTED_PAYLOAD), c => c.charCodeAt(0));
      const salt = payload.slice(0, 16);
      const iv = payload.slice(16, 28);
      const data = payload.slice(28);

      const key = await deriveKey(password, salt);
      const decrypted = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv }, key, data
      );
      return new TextDecoder().decode(decrypted);
    }

    function initCarousels() {
      document.querySelectorAll('.carousel-wrapper').forEach(wrapper => {
        const carousel = wrapper.querySelector('.carousel');
        const prev = wrapper.querySelector('.carousel-prev');
        const next = wrapper.querySelector('.carousel-next');
        if (!carousel || !prev || !next) return;

        const images = Array.from(carousel.querySelectorAll('img'));
        const pad = parseInt(getComputedStyle(carousel).paddingLeft) || 0;
        let index = 0;

        const scrollToIndex = (i) => {
          index = Math.max(0, Math.min(i, images.length - 1));
          const target = images[index];
          if (target) carousel.scrollTo({ left: target.offsetLeft - pad, behavior: 'smooth' });
          prev.classList.toggle('hidden', index === 0);
          next.classList.toggle('hidden', index >= images.length - 1);
        };

        prev.addEventListener('click', () => scrollToIndex(index - 1));
        next.addEventListener('click', () => scrollToIndex(index + 1));

        scrollToIndex(0);

        carousel.querySelectorAll('img').forEach(img => {
          img.style.cursor = 'pointer';
          img.addEventListener('click', () => openLightbox(img.src));
        });
      });
    }

    function openLightbox(src) {
      const lb = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      img.src = src;
      lb.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      const lb = document.getElementById('lightbox');
      lb.classList.remove('active');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });

    async function handleSubmit(e) {
      e.preventDefault();
      const input = document.getElementById("auth-input");
      const error = document.getElementById("auth-error");
      const password = input.value;

      if (!password || !ENCRYPTED_PAYLOAD) return false;

      try {
        const html = await decrypt(password);
        document.getElementById("auth-prompt").style.display = "none";
        const content = document.getElementById("protected-content");
        content.innerHTML = html;
        content.style.display = "";
        initCarousels();
      } catch {
        error.classList.add("visible");
        input.classList.add("shake", "error");
        input.addEventListener("animationend", () => input.classList.remove("shake"), { once: true });
        input.addEventListener("input", () => { input.classList.remove("error"); error.classList.remove("visible"); }, { once: true });
      }
      return false;
    }
  </script>
</body>

</html>
