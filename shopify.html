    async function deriveKey(password, salt) {
      const encoder = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey(
        "raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function decrypt(password) {
      const payload = Uint8Array.from(atob(ENCRYPTED_PAYLOAD), c => c.charCodeAt(0));
      const salt = payload.slice(0, 16);
      const iv = payload.slice(16, 28);
      const data = payload.slice(28);

      const key = await deriveKey(password, salt);
      const decrypted = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv }, key, data
      );
      return new TextDecoder().decode(decrypted);
    }

    function initCarousels() {
      document.querySelectorAll('.carousel-wrapper').forEach(wrapper => {
        const carousel = wrapper.querySelector('.carousel');
        const prev = wrapper.querySelector('.carousel-prev');
        const next = wrapper.querySelector('.carousel-next');
        if (!carousel || !prev || !next) return;

        const getImages = () => Array.from(carousel.querySelectorAll('img'));

        const snapEdge = () => carousel.getBoundingClientRect().left + (parseInt(getComputedStyle(carousel).paddingLeft) || 0);

        const updateArrows = () => {
          const edge = snapEdge();
          const images = getImages();
          const lastImg = images[images.length - 1];
          const atStart = carousel.scrollLeft <= 1;
          const atEnd = !lastImg || lastImg.getBoundingClientRect().left <= edge + 1;
          prev.classList.toggle('hidden', atStart);
          next.classList.toggle('hidden', atEnd);
        };

        prev.addEventListener('click', () => {
          const edge = snapEdge();
          const target = getImages().reverse().find(img => img.getBoundingClientRect().left < edge - 1);
          if (target) {
            carousel.scrollBy({ left: target.getBoundingClientRect().left - edge, behavior: 'smooth' });
          } else {
            carousel.scrollTo({ left: 0, behavior: 'smooth' });
          }
        });

        next.addEventListener('click', () => {
          const edge = snapEdge();
          const target = getImages().find(img => img.getBoundingClientRect().left > edge + 1);
          if (target) {
            carousel.scrollBy({ left: target.getBoundingClientRect().left - edge, behavior: 'smooth' });
          }
        });

        carousel.addEventListener('scroll', updateArrows, { passive: true });

        // Update arrows once images load (they affect scrollWidth)
        carousel.querySelectorAll('img').forEach(img => {
          img.addEventListener('load', updateArrows, { once: true });
        });

        updateArrows();
      });
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const input = document.getElementById("auth-input");
      const error = document.getElementById("auth-error");
      const password = input.value;

      if (!password || !ENCRYPTED_PAYLOAD) return false;

      try {
        const html = await decrypt(password);
        document.getElementById("auth-prompt").style.display = "none";
        const content = document.getElementById("protected-content");
        content.innerHTML = html;
        content.style.display = "";
        initCarousels();
      } catch {
        error.classList.add("visible");
        input.classList.add("shake", "error");
        input.addEventListener("animationend", () => input.classList.remove("shake"), { once: true });
        input.addEventListener("input", () => { input.classList.remove("error"); error.classList.remove("visible"); }, { once: true });
      }
      return false;
    }
  </script>
</body>

</html>
